<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Nang Khan Mon Mon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050002; overflow: hidden; touch-action: none;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Floating Roses */
        .rose-flower {
            position: absolute; font-size: 30px; pointer-events: none;
            z-index: 5; filter: drop-shadow(0 0 10px rgba(255, 45, 117, 0.5));
            user-select: none;
        }

        #container {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            width: 100%; height: 100%;
        }

        .name-text {
            color: #fff; font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 900; text-align: center;
            text-shadow: 0 0 30px #ff2d75;
            opacity: 0; position: absolute;
            transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
        }

        /* High-End Glassmorphism Box */
        .letter-box {
            opacity: 0; visibility: hidden;
            transform: scale(0.8) translateY(30px);
            transition: 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: rgba(255, 255, 255, 0.03);
            padding: 40px; border-radius: 40px;
            width: 80%; max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 0 20px rgba(255, 45, 117, 0.2);
            text-align: center;
        }

        .letter-text {
            color: #fff; font-size: clamp(1.1rem, 4vw, 1.4rem);
            line-height: 1.6; font-family: 'Dancing Script', cursive;
        }

        .highlight { color: #ff2d75; text-shadow: 0 0 10px #ff2d75; }

        /* UI Tap Info */
        #tap-info {
            position: absolute; bottom: 40px; color: rgba(255,255,255,0.6);
            font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
            border-bottom: 1px solid #ff2d75; padding-bottom: 5px;
            transition: 0.5s; z-index: 20;
        }

        .visible { opacity: 1 !important; visibility: visible !important; transform: scale(1) translateY(0) !important; }
        .hidden { opacity: 0 !important; filter: blur(20px); transform: scale(1.5) !important; }
    </style>
</head>
<body>

    <div id="container">
        <div id="main-name" class="name-text">NANG KHAN MON MON</div>
        <div id="letter" class="letter-box">
            <div class="letter-text">
                My Dearest <span class="highlight">Nang Khan Mon Mon</span>,<br><br>
                You are the most precious person in my life. <br><br>
                Have a safe trip to <span class="highlight">Taunggyi</span>. May the mountains be as beautiful as you are today. 🏔️🌹<br><br>
                I love you the most.
            </div>
        </div>
    </div>

    <div id="tap-info">Wait for the Glass Heart...</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const nameEl = document.getElementById('main-name');
        const letterEl = document.getElementById('letter');
        const infoEl = document.getElementById('tap-info');

        let width, height, particles = [];
        const particleCount = window.innerWidth < 600 ? 1000 : 2000;
        const heartPoints = [];
        let state = 'init'; // init, heart, explode, letter
        let tick = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 🌹 Rose Flower Spawner
        function spawnRose() {
            if (state !== 'letter') return;
            const rose = document.createElement('div');
            rose.className = 'rose-flower';
            rose.innerHTML = '🌹';
            rose.style.left = Math.random() * width + 'px';
            rose.style.top = '-50px';
            document.body.appendChild(rose);

            const duration = Math.random() * 4000 + 3000;
            rose.animate([
                { transform: `translateY(0) rotate(0deg) scale(0.5)`, opacity: 0 },
                { opacity: 1, offset: 0.2 },
                { transform: `translateY(${height + 100}px) rotate(${Math.random() * 1000}deg) scale(1.2)`, opacity: 0 }
            ], { duration: duration, easing: 'ease-in' }).onfinish = () => rose.remove();
        }

        function isInHeart(x, y) {
            const nx = x / 15; const ny = -y / 15;
            return Math.pow(nx * nx + ny * ny - 1, 3) - Math.pow(nx, 2) * Math.pow(ny, 3) <= 0;
        }

        function calculateHeart() {
            const scale = Math.min(width, height) / 38;
            for (let i = 0; i < particleCount; i++) {
                let rx, ry;
                do { rx = (Math.random() * 40 - 20); ry = (Math.random() * 40 - 20); } while (!isInHeart(rx, ry));
                heartPoints.push({ 
                    x: rx * scale + width / 2, 
                    y: ry * scale + height / 2 - 20 
                });
            }
        }

        class Particle {
            constructor(index) {
                this.index = index;
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.target = heartPoints[this.index % heartPoints.length];
                this.size = Math.random() * 2 + 0.5;
                this.color = this.index % 2 === 0 ? '#ff2d75' : '#ffb6c1';
                this.vx = (Math.random() - 0.5) * 15;
                this.vy = (Math.random() - 0.5) * 15;
            }
            update() {
                if (state === 'heart' || state === 'ready') {
                    this.x += (this.target.x - this.x) * 0.06;
                    this.y += (this.target.y - this.y) * 0.06;
                    // Glass Shimmer effect
                    this.size = 1.5 + Math.sin(tick * 0.05 + this.index) * 1;
                } else if (state === 'explode') {
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= 0.95; this.vy *= 0.95;
                    this.size *= 0.98;
                } else if (state === 'letter') {
                    this.y += 0.8;
                    this.x += Math.cos(tick * 0.02 + this.index) * 0.4;
                    if(this.y > height) this.y = -20;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = state === 'heart' ? 10 : 0;
                ctx.shadowColor = '#ff2d75';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function handleTap() {
            if (state === 'heart') {
                state = 'explode';
                nameEl.classList.add('hidden');
                infoEl.innerText = "SHATTERING GLASS...";
                setTimeout(() => {
                    state = 'ready';
                    infoEl.innerText = "TAP FOR THE LETTER";
                    infoEl.style.color = "#fff";
                }, 1500);
            } else if (state === 'ready') {
                state = 'letter';
                letterEl.classList.add('visible');
                infoEl.style.opacity = '0';
                setInterval(spawnRose, 400);
            }
        }

        function animate() {
            tick++;
            // Trail effect for motion smoothness
            ctx.fillStyle = 'rgba(5, 0, 2, 0.2)';
            ctx.fillRect(0, 0, width, height);
            for (let p of particles) { p.update(); p.draw(); }
            requestAnimationFrame(animate);
        }

        calculateHeart();
        for (let i = 0; i < particleCount; i++) particles.push(new Particle(i));

        setTimeout(() => { state = 'heart'; infoEl.innerText = "Crystallizing..."; }, 1500);
        setTimeout(() => { nameEl.classList.add('visible'); infoEl.innerText = "Tap the Glass Heart"; }, 4000);

        window.addEventListener('mousedown', handleTap);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); }, { passive: false });
        animate();
    </script>
</body>
</html>
